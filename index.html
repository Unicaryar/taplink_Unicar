<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Все ресурсы автосалона</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #6c757d;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .taplink-card {
            max-width: 580px;
            width: 100%;
            background: #ffffff;
            border-radius: 48px;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.35);
            padding: 32px 24px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Фоновое вертикальное видео */
        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.25;   /* 75% прозрачности */
            z-index: 0;
            pointer-events: none;
            border-radius: 48px;
        }

        /* Все контентные блоки — выше видео */
        .logo-container {
            margin-bottom: 24px;
            position: relative;
            z-index: 2;
        }

        .logo {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 60px;
            box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.2);
            border: 3px solid white;
            background-color: #f8f9fa;
        }

        .title-section {
            position: relative;
            z-index: 1;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            color: #212529;
            margin-bottom: 8px;
            position: relative;
        }

        .sub {
            color: #495057;
            font-size: 0.95rem;
            border-bottom: 1px solid #dee2e6;
            display: inline-block;
            padding-bottom: 6px;
            position: relative;
        }

        .buttons-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 8px;
            position: relative;
            z-index: 2;
        }

        .tap-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8f9fa;
            padding: 12px 20px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            color: #212529;
            transition: all 0.25s;
            border: 1px solid #e9ecef;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        .btn-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .btn-icon-img {
            height: 18px;
            width: auto;
            display: block;
        }

        .arrow-icon {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
        }
        .arrow-icon svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: #000000;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tap-btn:hover {
            transform: translateY(-2px);
            background-color: #ffffff;
            border-color: #ced4da;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.15);
        }

        .tap-btn:active {
            transform: translateY(1px);
        }

        .footer-note {
            margin-top: 36px;
            font-size: 0.75rem;
            color: #6c757d;
            border-top: 1px solid #dee2e6;
            padding-top: 20px;
            position: relative;
            z-index: 2;
        }

        @media (min-width: 768px) {
            .taplink-card {
                max-width: 560px;
            }
            .tap-btn {
                padding: 14px 24px;
                font-size: 1.18rem;
            }
            .arrow-icon {
                width: 20px;
                height: 20px;
            }
        }

        @media (max-width: 480px) {
            .taplink-card {
                padding: 24px 18px 32px;
            }
            .logo {
                width: 100px;
                height: 100px;
            }
            .tap-btn {
                padding: 10px 16px;
                font-size: 1rem;
            }
            .btn-left {
                gap: 12px;
            }
        }
    </style>
</head>
<body>
<div class="taplink-card">
    <!-- Вертикальное фоновое видео (75% прозрачности) -->
    <video class="bg-video" autoplay loop muted playsinline>
        <source src="video.mp4" type="video/mp4">
        <!-- Если видео не загрузится, фон останется белым -->
    </video>

    <div class="logo-container">
        <img src="logo.jpg" alt="Логотип автосалона" class="logo" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20fill%3D%22%23ddd%22%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2250%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2267%22%20text-anchor%3D%22middle%22%20fill%3D%22%23999%22%20font-size%3D%2242%22%3ELOGO%3C%2Ftext%3E%3C%2Fsvg%3E';">
    </div>

    <div class="title-section">
        <h1>Все ресурсы автосалона</h1>
        <div class="sub">⚡ Официальные каналы</div>
    </div>

    <div id="buttons-container" class="buttons-group"></div>

    <div class="footer-note">
        Нажмите на кнопку — перейдёте на нужный ресурс
    </div>
</div>

<script>
    // ================= НАСТРАИВАЕМЫЙ МАССИВ РЕСУРСОВ =================
    const resources = [
        {
            name: "Avito",
            url: "https://clc.li",
            icon: "avito.png",
            displayText: "Мы на Авито"
        },
        {
            name: "MAX",
            url: "https://max.ru",
            icon: "max.png",
            displayText: "Мы в MAX"
        },
        {
            name: "RUTUBE",
            url: "https://rutube.ru",
            icon: "rutube.png",
            displayText: "Мы в RUTUBE"
        },
        {
            name: "Telegram",
            url: "https://t.me",
            icon: "telegram.png",
            displayText: "Мы в Telegram"
        },
        {
            name: "VK",
            url: "https://vk.com/your_company",
            icon: "vk.png",
            displayText: "Мы в VK"
        }
    ];
    // =================================================================

    function getFallbackSvg(serviceName) {
        const svgNS = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(svgNS, "svg");
        svg.setAttribute("height", "18");
        svg.setAttribute("viewBox", "0 0 24 24");
        svg.style.display = "block";
        
        const nameLower = serviceName.toLowerCase();
        if (nameLower.includes("avito")) {
            const circle = document.createElementNS(svgNS, "circle");
            circle.setAttribute("cx", "12");
            circle.setAttribute("cy", "12");
            circle.setAttribute("r", "10");
            circle.setAttribute("stroke", "#000");
            circle.setAttribute("stroke-width", "1.2");
            circle.setAttribute("fill", "none");
            const path = document.createElementNS(svgNS, "path");
            path.setAttribute("d", "M8.5 11.5L11 14L16 8");
            path.setAttribute("stroke", "#000");
            path.setAttribute("stroke-width", "1.5");
            path.setAttribute("fill", "none");
            svg.appendChild(circle);
            svg.appendChild(path);
        } else if (nameLower.includes("max")) {
            const rect = document.createElementNS(svgNS, "rect");
            rect.setAttribute("x", "3");
            rect.setAttribute("y", "5");
            rect.setAttribute("width", "18");
            rect.setAttribute("height", "14");
            rect.setAttribute("rx", "2");
            rect.setAttribute("stroke", "#000");
            rect.setAttribute("stroke-width", "1.2");
            rect.setAttribute("fill", "none");
            const text = document.createElementNS(svgNS, "text");
            text.setAttribute("x", "12");
            text.setAttribute("y", "17");
            text.setAttribute("text-anchor", "middle");
            text.setAttribute("font-family", "Arial");
            text.setAttribute("font-weight", "bold");
            text.setAttribute("font-size", "11");
            text.setAttribute("fill", "#000");
            text.textContent = "MAX";
            svg.appendChild(rect);
            svg.appendChild(text);
        } else if (nameLower.includes("rutube")) {
            const circle = document.createElementNS(svgNS, "circle");
            circle.setAttribute("cx", "12");
            circle.setAttribute("cy", "12");
            circle.setAttribute("r", "10");
            circle.setAttribute("stroke", "#000");
            circle.setAttribute("stroke-width", "1.2");
            circle.setAttribute("fill", "none");
            const polygon = document.createElementNS(svgNS, "polygon");
            polygon.setAttribute("points", "10,8 16,12 10,16");
            polygon.setAttribute("fill", "#000");
            svg.appendChild(circle);
            svg.appendChild(polygon);
        } else if (nameLower.includes("telegram")) {
            const path = document.createElementNS(svgNS, "path");
            path.setAttribute("d", "M20.665 3.717l-17.73 6.837c-1.21.486-1.202 1.161-.221 1.462l4.552 1.42 10.532-6.645c.497-.3.952-.14.579.192l-8.533 7.701h-.002l.002.001-.002.001 1.192 4.566c.168.733.399.882.783.882.39 0 .655-.267 1.002-.61l2.389-2.317 4.994 3.689c.91.5 1.562.242 1.787-.84l3.23-15.23c.294-1.354-.488-1.969-1.576-1.397z");
            path.setAttribute("fill", "#000");
            svg.appendChild(path);
        } else {
            const circle = document.createElementNS(svgNS, "circle");
            circle.setAttribute("cx", "12");
            circle.setAttribute("cy", "12");
            circle.setAttribute("r", "10");
            circle.setAttribute("stroke", "#000");
            circle.setAttribute("stroke-width", "1.2");
            circle.setAttribute("fill", "none");
            const text = document.createElementNS(svgNS, "text");
            text.setAttribute("x", "12");
            text.setAttribute("y", "16");
            text.setAttribute("text-anchor", "middle");
            text.setAttribute("font-size", "10");
            text.setAttribute("fill", "#000");
            text.textContent = "!";
            svg.appendChild(circle);
            svg.appendChild(text);
        }
        return svg;
    }

    function renderButtons() {
        const container = document.getElementById('buttons-container');
        if (!container) return;
        container.innerHTML = '';
        
        if (!resources.length) {
            container.innerHTML = '<div style="color:#d32f2f; background:#ffebee; padding:12px; border-radius:28px;">Нет добавленных ресурсов</div>';
            return;
        }
        
        resources.forEach(res => {
            const link = document.createElement('a');
            link.href = res.url;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.className = 'tap-btn';
            
            const leftDiv = document.createElement('div');
            leftDiv.className = 'btn-left';
            
            const img = document.createElement('img');
            img.src = res.icon;
            img.alt = res.name;
            img.className = 'btn-icon-img';
            img.onerror = () => {
                const fallback = getFallbackSvg(res.name);
                fallback.classList.add('btn-icon-img');
                leftDiv.replaceChild(fallback, img);
            };
            leftDiv.appendChild(img);
            
            const textSpan = document.createElement('span');
            textSpan.textContent = res.displayText || `Мы в ${res.name}`;
            leftDiv.appendChild(textSpan);
            
            const arrowSpan = document.createElement('span');
            arrowSpan.className = 'arrow-icon';
            arrowSpan.innerHTML = '<svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
            
            link.appendChild(leftDiv);
            link.appendChild(arrowSpan);
            container.appendChild(link);
        });
    }
    
    renderButtons();
</script>
</body>
</html>
